<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TrendLife Icon Generator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      text-align: center;
      background: #F8F9FA;
    }
    .icons {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
      margin-top: 30px;
    }
    .icon-wrapper {
      text-align: center;
      background: white;
      padding: 20px;
      border-radius: 8px;
      border: 1px solid #E9ECEF;
    }
    canvas {
      display: block;
      margin: 0 auto 10px;
    }
    button {
      background-color: #D71921;
      color: white;
      border: none;
      padding: 12px 24px;
      margin-top: 10px;
      cursor: pointer;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
    }
    button:hover {
      background-color: #B8151C;
    }
  </style>
</head>
<body>
  <h1>TrendLife Icon Generator</h1>
  <button onclick="generateIcons()">Generate Icons</button>
  <div class="icons" id="iconsContainer"></div>

  <script>
    function generateIcons() {
      const sizes = [16, 24, 32, 48, 128];
      const container = document.getElementById('iconsContainer');
      container.innerHTML = '';

      sizes.forEach(size => {
        const wrapper = document.createElement('div');
        wrapper.className = 'icon-wrapper';

        const canvas = document.createElement('canvas');
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext('2d');

        // Gray gradient background with SOFT CURVES
        const gradient = ctx.createLinearGradient(0, 0, size, size);
        gradient.addColorStop(0, '#B8BCC2');
        gradient.addColorStop(1, '#7D8389');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, size, size);

        // Soft rounded corners (larger radius for smoother curves)
        ctx.globalCompositeOperation = 'destination-in';
        ctx.beginPath();
        const radius = size * 0.25; // Larger radius = softer curves
        ctx.moveTo(radius, 0);
        ctx.lineTo(size - radius, 0);
        ctx.arcTo(size, 0, size, radius, radius);
        ctx.lineTo(size, size - radius);
        ctx.arcTo(size, size, size - radius, size, radius);
        ctx.lineTo(radius, size);
        ctx.arcTo(0, size, 0, size - radius, radius);
        ctx.lineTo(0, radius);
        ctx.arcTo(0, 0, radius, 0, radius);
        ctx.closePath();
        ctx.fill();
        ctx.globalCompositeOperation = 'source-over';

        // Draw TrendLife logo (two interlocking ellipses with soft curves)
        const centerX = size / 2;
        const centerY = size / 2;
        const scale = size / 80;

        ctx.fillStyle = '#D71921';
        ctx.strokeStyle = '#D71921';
        ctx.lineWidth = size * 0.09;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        // Left ellipse (smaller, filled, soft)
        ctx.save();
        ctx.translate(centerX - 8 * scale, centerY + 1 * scale);
        ctx.rotate(-25 * Math.PI / 180);
        ctx.beginPath();
        ctx.ellipse(0, 0, 11 * scale, 14 * scale, 0, 0, 2 * Math.PI);
        ctx.fill();
        ctx.restore();

        // Right ellipse (larger, hollow, soft curves)
        ctx.save();
        ctx.translate(centerX + 7 * scale, centerY - 1 * scale);
        ctx.rotate(15 * Math.PI / 180);
        ctx.beginPath();
        ctx.ellipse(0, 0, 15 * scale, 19 * scale, 0, 0, 2 * Math.PI);
        ctx.stroke();
        ctx.restore();

        const label = document.createElement('p');
        label.textContent = `icon${size}.png`;
        label.style.color = '#6C757D';
        label.style.fontSize = '12px';

        wrapper.appendChild(canvas);
        wrapper.appendChild(label);
        container.appendChild(wrapper);
      });
    }

    window.onload = generateIcons;
  </script>
</body>
</html>
