<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TrendLife Icon Resizer</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 30px;
      background: #F8F9FA;
      text-align: center;
    }
    h1 { color: #212529; margin-bottom: 30px; }
    .upload-area {
      background: white;
      border: 2px dashed #DEE2E6;
      border-radius: 8px;
      padding: 40px;
      margin-bottom: 30px;
      cursor: pointer;
    }
    .upload-area:hover { border-color: #D71921; }
    #fileInput { display: none; }
    .icons { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; margin-top: 30px; }
    .icon-box {
      background: white;
      padding: 20px;
      border-radius: 8px;
      border: 1px solid #E9ECEF;
      text-align: center;
    }
    canvas { display: block; margin: 10px auto; border: 1px solid #E9ECEF; }
    button {
      background: #D71921;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      margin-top: 10px;
    }
    button:hover { background: #B8151C; }
    .download-all {
      background: #28a745;
      color: white;
      padding: 15px 30px;
      font-size: 16px;
      font-weight: 600;
      margin: 20px auto;
      display: inline-block;
    }
    p { color: #6C757D; }
  </style>
</head>
<body>
  <h1>TrendLife Icon Resizer</h1>

  <div class="upload-area" onclick="document.getElementById('fileInput').click()">
    <h3 style="margin: 0 0 10px 0; color: #495057;">Click to Upload Designer (2).png</h3>
    <p style="margin: 0;">Or drag and drop the image here</p>
  </div>

  <input type="file" id="fileInput" accept="image/png">

  <div id="iconsContainer" class="icons"></div>

  <script>
    const sizes = [16, 24, 32, 48, 128];
    let sourceImage = null;

    document.getElementById('fileInput').addEventListener('change', handleFile);

    // Drag and drop
    const uploadArea = document.querySelector('.upload-area');
    uploadArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadArea.style.borderColor = '#D71921';
    });
    uploadArea.addEventListener('dragleave', () => {
      uploadArea.style.borderColor = '#DEE2E6';
    });
    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadArea.style.borderColor = '#DEE2E6';
      if (e.dataTransfer.files.length > 0) {
        handleFileFromDrop(e.dataTransfer.files[0]);
      }
    });

    function handleFileFromDrop(file) {
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          sourceImage = img;
          generateIcons();
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }

    function handleFile(e) {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          sourceImage = img;
          generateIcons();
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }

    function generateIcons() {
      const container = document.getElementById('iconsContainer');
      container.innerHTML = '';

      sizes.forEach(size => {
        const box = document.createElement('div');
        box.className = 'icon-box';

        const canvas = document.createElement('canvas');
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext('2d');

        // Draw resized image
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = 'high';
        ctx.drawImage(sourceImage, 0, 0, size, size);

        // Apply soft rounded corners (25% radius for smooth curves)
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = size;
        tempCanvas.height = size;
        const tempCtx = tempCanvas.getContext('2d');

        // Create rounded rectangle mask
        const radius = size * 0.25; // 25% radius = soft curves
        tempCtx.beginPath();
        tempCtx.moveTo(radius, 0);
        tempCtx.lineTo(size - radius, 0);
        tempCtx.arcTo(size, 0, size, radius, radius);
        tempCtx.lineTo(size, size - radius);
        tempCtx.arcTo(size, size, size - radius, size, radius);
        tempCtx.lineTo(radius, size);
        tempCtx.arcTo(0, size, 0, size - radius, radius);
        tempCtx.lineTo(0, radius);
        tempCtx.arcTo(0, 0, radius, 0, radius);
        tempCtx.closePath();
        tempCtx.fill();

        // Apply mask to original image
        tempCtx.globalCompositeOperation = 'source-in';
        tempCtx.drawImage(canvas, 0, 0);

        // Copy back to main canvas
        ctx.clearRect(0, 0, size, size);
        ctx.drawImage(tempCanvas, 0, 0);

        const label = document.createElement('p');
        label.textContent = `icon${size}.png`;
        label.style.margin = '5px 0';
        label.style.fontWeight = '600';

        const btn = document.createElement('button');
        btn.textContent = 'Download';
        btn.onclick = () => downloadIcon(canvas, size);

        box.appendChild(canvas);
        box.appendChild(label);
        box.appendChild(btn);
        container.appendChild(box);
      });
    }

    function downloadIcon(canvas, size) {
      canvas.toBlob((blob) => {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `icon${size}.png`;
        a.click();
        URL.revokeObjectURL(url);
      });
    }
  </script>
</body>
</html>
